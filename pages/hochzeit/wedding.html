<!DOCTYPE html>
<html>
<head>
  <title>Sara und Jakob</title>
  <link rel="stylesheet" href="../../css/w3.css">
  <link rel="stylesheet" href="../../css/w3-theme.css">
  <link rel="stylesheet" href="../../css/wedding.css">
  <link rel="stylesheet" href="../../css/leaflet.css">
  <!-- from https://unpkg.com/leaflet/dist/leaflet.css -->
</head>

<body>

  <!-- Sidebar -->
  <nav class="w3-sidebar w3-bar-block w3-card w3-light-grey" style="width:220px">
    <button class="w3-bar-item w3-button w3-large">Menu</button>
    <a href="#home" class="w3-bar-item w3-button w3-text-gray" style="text-decoration:none;"><i class="fa fa-party"></i> Home</a>
    <a href="#location" class="w3-bar-item w3-button w3-text-gray" style="text-decoration:none;"><i class="fa fa-party"></i> Hochzeitslocation</a>
    <a href="#celebration" class="w3-bar-item w3-button w3-text-gray" style="text-decoration:none;"><i class="fa fa-party"></i> Sektempfang & Feier</a>
    <a href="#schedule" class="w3-bar-item w3-button w3-text-gray" style="text-decoration:none;"><i class="fa fa-party"></i> Ablauf</a>
    <a href="#contact" class="w3-bar-item w3-button w3-text-gray" style="text-decoration:none;"><i class="fa fa-envelope"></i> Kontakt</a>
  </nav>
  

  <!-- Main Content -->
  <section id="home">
  <div style="margin-left:220px">
    <div class="w3-row">
      <div class="w3-half hero">
          <!-- Background image left -->
      </div>
      <div class="w3-half invite-card">
        <div class="invite-inner">
          <img src="../../images/wedding/flower.png" style="width:120px"><br>
          <h1>JAKOB</h1><br>
          <img src="../../images/wedding/couple.jpg" class="imgage-round" style="width:180px"><br>
          <h1>SARA</h1><br>
          <img src="../../images/wedding/flower.png" class="image-flip-ud" style="width:120px">
        </div>
      </div>
    </div>
  </div>
  </section>
  

  <!-- Content about Location -->
  <section id="location" class="content-main w3-container">
      <h2>Hochzeitslocation</h2>
      <div class="w3-row">
        <div class="w3-half w3-container">
          <div class="w3-card-1">
            <div class="w3-container">
              <img class="w3-padding w3-image" src="../../images/wedding/kapelle.jpg" alt="Maximilanskapelle">
              <p> Maximilanskapelle, Neues Schloss Schleißheim</p>
            </div>
          </div>
        </div>
        <div class="w3-half w3-container">
          <div class="w3-card-1">
            <div class="w3-container">
              <!-- Karte mit dem Schloss markiert -->
              <div id="map"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Content about Celebration Location -->
    <section id="celebration" class="content-main w3-container">
      <h2>Sektempfang und Feier</h2>
      <div class="w3-row">
        <div class="w3-half w3-container">
          <div class="w3-card-1">
            <div class="w3-container">
              <img class="w3-padding w3-image" src="../../images/wedding/kurfuerst.svg" alt="Maximilanskapelle">
              <p> Restaurant Kurfürst, <a href="https://www.kurfuerst.restaurant/">Lustheim</a></p>
            </div>
          </div>
        </div>

      </div>
    </section>

    <!-- Detailed Schedule -->
    <section id="schedule" class="content-main w3-container">
      <h2>Ablauf</h2>
      <div class="w3-row">
      </div>
    </section>


    <!-- Detailed Schedule -->
    <section id="contact" class="content-main w3-container">
      <h2>Kontakt</h2>
      <div class="w3-row">
      </div>
    </section>


    <!-- scripts -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.5.1/gpx.min.js"></script>
</body>
</html>
